services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fiap-cloud-games-db
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=SuaSenhaForte!2026
      - MSSQL_PID=Developer
    networks:
      - fiap-network

  redis:
    image: redis:latest
    container_name: fiap-cloud-games-cache
    ports:
      - "6379:6379"
    networks:
      - fiap-network

networks:
  fiap-network:
    driver: bridge