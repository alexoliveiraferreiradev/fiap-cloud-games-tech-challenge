services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fiap-cloud-games-db
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=FiapCloundGames@2026
      - MSSQL_PID=Developer
    networks:
      - fiap-network

  redis-insight:
    image: redis/redisinsight:latest
    container_name: fiap-cloud-games-insight
    ports:
      - "8001:8001"
    networks:
      - fiap-network

networks:
  fiap-network:
    driver: bridge